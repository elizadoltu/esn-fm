name: Deploy to Railway Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests-be:
    uses: ./.github/workflows/run-tests-be.yml

  migrate:
    needs: run-tests-be
    uses: ./.github/workflows/migrate-db.yml
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD }}
        run: railway up --service=esn-fm-prod --detach

      - name: ✅ Deployment Success
        run: echo "Deployed to Railway Prod!"